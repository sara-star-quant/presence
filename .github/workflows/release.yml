name: release

# Triggered when a tag matching v* is pushed. Extracts the matching
# `## v<TAG>` section from CHANGELOG.md, asserts ASCII + no em-dash, builds
# Rust release artifacts (presence-client) on three platforms when ext/
# is present in the tagged tree, attaches them to the release, and creates
# the GitHub Release marked --latest when this is the highest semver.
#
# Replaces the manual `gh release create` flow used for v0.3.0 - v0.3.3.
# All values flowing into shell commands are passed via env: per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required for gh release create + asset upload

jobs:
  build-rust:
    name: build presence-client (${{ matrix.target }})
    # Skip if ext/ is not present (older tags, doc-only tags). The build
    # job continues on if Cargo.toml is missing; the release job below
    # tolerates absent artifacts.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: presence-client-linux-x86_64
          - target: x86_64-apple-darwin
            # Cross-compile from arm64. macos-13 (Intel) runner pool is
            # chronically congested; v0.4.0 / v0.4.1 / v0.4.2 / v0.5.0 attempts
            # all stalled in the Intel queue. Apple's clang on macos-latest
            # (arm64) produces x86_64 mach-o binaries via the universal SDK;
            # the toolchain action's targets: input below installs the
            # x86_64-apple-darwin target. One runner pool, no Intel queue.
            os: macos-latest
            artifact: presence-client-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: presence-client-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Skip if ext/ missing
        id: check_ext
        run: |
          if [ -f ext/Cargo.toml ]; then
            echo "have_ext=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_ext=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ext/ not present in this tag; skipping Rust build"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.check_ext.outputs.have_ext == 'true'
        with:
          targets: ${{ matrix.target }}
      - name: Install system libraries (Linux only)
        # The git2 crate links against libgit2 which needs pkg-config +
        # libssh2 + libssl headers. Bare ubuntu-latest runners don't have
        # them. macOS runners get equivalents via Apple's frameworks.
        if: steps.check_ext.outputs.have_ext == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssh2-1-dev \
            libssl-dev \
            zlib1g-dev
      - name: Build presence-client
        if: steps.check_ext.outputs.have_ext == 'true'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cd ext
          cargo build --release --bin presence-client --no-default-features --target "$TARGET"
      - name: Stage artifact
        if: steps.check_ext.outputs.have_ext == 'true'
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          mkdir -p /tmp/release-assets
          cp "ext/target/$TARGET/release/presence-client" "/tmp/release-assets/$ARTIFACT_NAME"
          chmod +x "/tmp/release-assets/$ARTIFACT_NAME"
          ls -la /tmp/release-assets/
      - name: Upload artifact
        # v6 runs on Node 24; v4 was deprecated by GitHub Actions (Node 20
        # removal scheduled for September 2026, default flip June 2026).
        if: steps.check_ext.outputs.have_ext == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/release-assets/${{ matrix.artifact }}
          retention-days: 7

  release:
    name: publish GitHub release
    needs: build-rust
    if: always()   # publish even if some Rust builds fail; release notes are independent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history so the tag commit is reachable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Extract CHANGELOG section and derive title
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os, pathlib, re, sys
          # TAG_NAME comes from github.ref_name via env (safe per the workflow-
          # injection guide referenced in the file header). first_line is read
          # from the in-repo CHANGELOG.md at the tagged commit; not user input.
          tag = os.environ["TAG_NAME"].lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"^## v{re.escape(tag)}\n(.*?)(?=^## v|\Z)", text, re.MULTILINE | re.DOTALL)
          if not m:
              sys.exit(f"no CHANGELOG section for v{tag}")
          body = m.group(1).strip()
          first_line = next((ln for ln in body.splitlines() if ln.strip() and not ln.startswith("#")), "").strip()

          # Title clipping. GitHub's release-name field truncates around 100 chars;
          # blind [:80] cuts mid-word (v0.6.0 shipped with title ending "...and fresh").
          # Prefer the first sentence boundary; fall back to a word-boundary clip near
          # 80 chars and strip dangling punctuation. Empty CHANGELOG falls back to
          # "vX.Y.Z" with no suffix.
          if not first_line:
              title = f"v{tag}"
          else:
              sentence_end = first_line.find(". ")
              if 0 < sentence_end <= 80:
                  clipped = first_line[:sentence_end]
              else:
                  clipped = first_line[:80]
                  last_space = clipped.rfind(" ")
                  if last_space > 40:
                      clipped = clipped[:last_space]
                  clipped = clipped.rstrip(".,;:\"' ")
              title = f"v{tag}: {clipped}"

          pathlib.Path("/tmp/release-notes.md").write_text(body, encoding="utf-8")
          gh_out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with gh_out.open("a", encoding="utf-8") as f:
              f.write(f"title<<EOF\n{title}\nEOF\n")
          PY

      - name: Verify release notes are ASCII-only with no em-dash / en-dash
        run: |
          if LC_ALL=C grep -nP '[^\x00-\x7F]' /tmp/release-notes.md; then
            echo "::error::release notes contain non-ASCII; refusing to publish"
            exit 1
          fi
          if LC_ALL=C grep -nP '[\xe2\x80\x93\xe2\x80\x94]' /tmp/release-notes.md; then
            echo "::error::release notes contain em-dash or en-dash; refusing to publish"
            exit 1
          fi
          echo "release notes are ASCII-only with no em/en dashes"

      - name: Determine if this tag is the highest semver
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          highest="$(gh api "repos/${REPO}/tags" --paginate --jq '.[].name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ "$TAG_NAME" = "$highest" ]; then
            echo "flag=--latest" >> "$GITHUB_OUTPUT"
            echo "this tag ($TAG_NAME) is the highest semver; marking release as latest"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "tag $TAG_NAME is not the highest semver ($highest); release will not be marked latest"
          fi

      - name: Download Rust build artifacts (best-effort)
        # v6 runs on Node 24; matches the upload-artifact bump above.
        uses: actions/download-artifact@v6
        with:
          path: /tmp/release-assets
        continue-on-error: true   # release notes still publish even if Rust builds failed

      - name: List available release assets
        run: |
          if [ -d /tmp/release-assets ]; then
            find /tmp/release-assets -type f -name 'presence-client-*' | sort
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TITLE: ${{ steps.changelog.outputs.title }}
          LATEST_FLAG: ${{ steps.latest.outputs.flag }}
        run: |
          # Collect any presence-client-* artifacts that were uploaded.
          asset_args=()
          if [ -d /tmp/release-assets ]; then
            while IFS= read -r f; do
              [ -f "$f" ] && asset_args+=("$f")
            done < <(find /tmp/release-assets -type f -name 'presence-client-*' | sort)
          fi
          # shellcheck disable=SC2086  # LATEST_FLAG is intentionally split when set
          gh release create "$TAG_NAME" \
            --target main \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            $LATEST_FLAG \
            "${asset_args[@]}"
