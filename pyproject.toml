# presence is a Claude Code plugin, not a Python package.
# Plugin metadata lives in .claude-plugin/plugin.json.
# This file holds only dev-tool configuration (ruff, pytest) and the dev
# dependency group used by contributors for local testing.

# PEP 735 dependency groups. Install with:
#   python3 -m venv .venv
#   .venv/bin/pip install --group dev
# (Requires pip >= 25.1; older pip can fall back to:
#   .venv/bin/pip install pytest cryptography ruff bandit)
[dependency-groups]
dev = [
  "pytest>=9.1.1",
  "cryptography",  # only needed to exercise the zerotrust at-rest encryption tests
  "ruff>=0.15.17",
  "bandit>=1.9.4",  # security scan; CI parity with the lint job
  "coverage>=7.14.1",  # statement-coverage measurement (incl. subprocess hooks); CI parity
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["docs", "presets"]

[tool.ruff.lint]
select = [
  "E", "F", "W",
  "I",
  "B",
  "UP",
  "S",
  "RET",
  "SIM",
  "PL",
]
ignore = [
  "E501",
  "S603",
  "S607",
  "PLR0913",
  "PLC0415",
  "SIM105",
  "PLR2004",
  "PLR0912",
  "PLR0911",
  "PLW0603",  # module-level cache pattern; recognized
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S108"]
"lib/_common.py" = ["S110", "BLE001"]
"lib/warnings_log.py" = ["E731"]
# v0.4.0 daemon: try/except/pass is the right pattern in the outermost guards
# (we never want a hook crash to kill the daemon process); 53 statements in
# handle_client is fine for a single dispatch entry point.
"lib/daemon.py" = ["S110", "PLR0915", "BLE001"]
# v0.4.0 telemetry/crypto fast paths: presence_ext is optional, missing it
# must fall through to subprocess; try/except/pass is the right semantic.
"lib/telemetry.py" = ["S110"]
"lib/crypto.py" = ["S110"]
# v0.5.0 redaction profiles: _load_profile parses JSON, compiles patterns and
# tracks per-pattern issues in one linear pass; _cli dispatches three read-only
# subcommands. Both single-purpose; splitting obscures the flow.
"lib/redact.py" = ["PLR0915"]

[tool.bandit]
# Skips chosen to match the project's already-accepted exceptions:
#   B603/B607 = ruff S603/S607 (subprocess without shell, partial exec path)
#   B110      = ruff S110 (try/except/pass guards; each site carries a noqa)
#   B404      = plain `import subprocess` (informational; no ruff equivalent)
# The one remaining Medium finding (B310 urlopen in update_check.py) is a fixed
# https URL and is suppressed inline with `# nosec B310`, not skipped globally.
skips = ["B603", "B607", "B110", "B404"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
filterwarnings = ["error"]

[tool.coverage.run]
# Statement coverage of the runtime source, measured in-process so the number is
# deterministic. Omitted:
#   presence_ext/*  - compiled Rust extension (gitignored build artifact).
#   daemon.py       - runs only as a spawned subprocess, so in-process coverage
#                     cannot see it; it is behavior-tested by tests/test_daemon.py
#                     (socket perms, pid file, cache clearing, idle timeout,
#                     malformed JSON). Counting it would require flaky subprocess
#                     capture, which this project deliberately does not use.
source = ["lib"]
omit = ["lib/presence_ext/*", "lib/daemon.py"]

[tool.coverage.report]
show_missing = true
