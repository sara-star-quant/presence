# presence is a Claude Code plugin, not a Python package.
# Plugin metadata lives in .claude-plugin/plugin.json.
# This file holds only dev-tool configuration (ruff, pytest) and the dev
# dependency group used by contributors for local testing.

# PEP 735 dependency groups. Install with:
#   python3 -m venv .venv
#   .venv/bin/pip install --group dev
# (Requires pip >= 25.1; older pip can fall back to:
#   .venv/bin/pip install pytest cryptography ruff)
[dependency-groups]
dev = [
  "pytest>=8",
  "cryptography",  # only needed to exercise the zerotrust at-rest encryption tests
  "ruff>=0.6",
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["docs", "presets"]

[tool.ruff.lint]
select = [
  "E", "F", "W",
  "I",
  "B",
  "UP",
  "S",
  "RET",
  "SIM",
  "PL",
]
ignore = [
  "E501",
  "S603",
  "S607",
  "PLR0913",
  "PLC0415",
  "SIM105",
  "PLR2004",
  "PLR0912",
  "PLR0911",
  "PLW0603",  # module-level cache pattern; recognized
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S108"]
"lib/_common.py" = ["S110", "BLE001"]
"lib/warnings_log.py" = ["E731"]
# v0.4.0 daemon: try/except/pass is the right pattern in the outermost guards
# (we never want a hook crash to kill the daemon process); 53 statements in
# handle_client is fine for a single dispatch entry point.
"lib/daemon.py" = ["S110", "PLR0915", "BLE001"]
# v0.4.0 telemetry/crypto fast paths: presence_ext is optional, missing it
# must fall through to subprocess; try/except/pass is the right semantic.
"lib/telemetry.py" = ["S110"]
"lib/crypto.py" = ["S110"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
filterwarnings = ["error"]
